name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/azure-static-web-apps.yml
      - public/**
      - src/**
      - eslint.config.js
      - index.html
      - package-lock.json
      - package.json
      - staticwebapp.config.json
      - tsconfig.app.json
      - tsconfig.json
      - tsconfig.node.json
      - vite.config.ts
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - .github/workflows/azure-static-web-apps.yml
      - public/**
      - src/**
      - eslint.config.js
      - index.html
      - package-lock.json
      - package.json
      - staticwebapp.config.json
      - tsconfig.app.json
      - tsconfig.json
      - tsconfig.node.json
      - vite.config.ts

permissions:
  contents: read

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build Vite app
        run: npm run build

      - name: Copy Azure Static Web Apps config
        run: cp staticwebapp.config.json dist/staticwebapp.config.json

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: dist
          skip_app_build: true
